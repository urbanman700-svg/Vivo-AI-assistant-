name: Build Vivo Assistant APK

# Triggers: push to main/master, pull request, or manual run
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # Manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # Step 1: Checkout the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 (required for this project)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step 3: Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Step 4: Setup Gradle 8.2 (matches gradle-wrapper.properties)
      # This handles missing gradle-wrapper.jar automatically
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.2"

      # Step 5: Generate Gradle wrapper (fixes missing gradlew + wrapper.jar)
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2 --distribution-type bin

      # Step 6: Make gradlew executable
      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      # Step 7: Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

      # Step 8: Upload APK as downloadable artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VivoAssistant-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # APK available for 30 days

      # Step 9: Show APK info in build log
      - name: Show APK Details
        run: |
          echo "=== Build Successful ==="
          ls -lh app/build/outputs/apk/debug/*.apk
          echo "APK is available in Actions → Artifacts → VivoAssistant-Debug-APK"
